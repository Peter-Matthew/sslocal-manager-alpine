version: '3'

services:
  ssserver-rust:
    image: petermatthew/ssserver-rust
    container_name: ssserver-rust
    restart: always
    # ports: # 映射端口，如果需要让其他机器访问，请取消注释
    #   - '8388:8388/udp'
    #   - '8388:8388/tcp'
    volumes:
      - ./.ssconfig.json:/.ssconfig.json:ro
  sslocal-rust:
    image: petermatthew/sslocal-rust
    container_name: sslocal-rust
    restart: always
    ports:
      - "1080:1080/udp"   # ss-local 代理端口
      - "1080:1080/tcp"   # ss-local 代理端口
    volumes:
      - ./.ssconfig.json:/.ssconfig.json:ro
